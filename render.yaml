# Render blueprint for Anime Bomber.
#
# Free, card-free web service. Render injects the PORT env var and the custom
# server reads it. WebSockets work on the same origin (/ws) automatically.
#
# NOTE: the game keeps every room in memory on a SINGLE instance, so do not
# scale this service beyond 1 instance.

services:
  - type: web
    name: anime-bomber
    runtime: node
    plan: free
    region: singapore
    # NODE_ENV=production is set below, which makes `npm install` skip
    # devDependencies. `--include=dev` forces them in so `next build` has
    # tailwind/postcss/typescript available at build time.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
